<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        .box{
            width: 100px;
            height: 100px;
            background-color: red;
        }
        .boxes{
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        ul li{
            list-style: none;
            color:blue;
        }
        ul{
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        section{
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: center;
            width: 100%;
        }
    </style>
</head>
<body>
    <section>
        <div class="nav">
            <ul>
                <li data-filter="all">All</li>
                <li data-filter="app">App</li>
                <li data-filter="web">Web</li>
            </ul>
        </div>
        <div class="boxes">
            <div class="box" data-category="app">App 1</div>
            <div class="box" data-category="app">App 2</div>
            <div class="box" data-category="web">Web 1</div>
            <div class="box" data-category="web">Web 2</div>
        </div>
    </section>
    
    
    <script>
    	const navs = document.querySelectorAll(".nav ul li");
        const boxes = document.querySelectorAll(".box");
        
        navs.forEach((nav)=>{
        	nav.addEventListener("click", ()=>{
            	const navData = nav.getAttribute("data-filter");
                
                navs.forEach((item)=>{
                	item.style.color = "blue";
                })
                
                nav.style.color="red";
                
                boxes.forEach((box)=>{
                	const boxData = box.getAttribute("data-category");
                    
                    if(navData == "all" || navData == boxData){
                    	box.style.display = "flex";
                    }
                    else{
                    	box.style.display = "none";
                    }
                })
                
            })
        })
        
        
    </script>
</body>
</html>
