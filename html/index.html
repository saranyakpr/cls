<!DOCTYPE html>
<html>
<head>
  <title>Coffee</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <section class="hero">
    <div class="card">
      <nav>
        <div class="logo">☕ Coffee</div>
        <ul>
          <li>Home</li>
          <li>About</li>
          <li>Menu</li>
          <li>Testimonials</li>
          <li>Gallery</li>
          <li>Contact</li>
        </ul>
      </nav>

      <div class="content">
        <div class="text">
          <h3>Best Coffee</h3>
          <h1>Make your day great with our special coffee!</h1>
          <p>Welcome to our coffee paradise where every bean tells a story and every cup sparks joy.</p>

          <div class="buttons">
            <button class="order">Order Now</button>
            <button class="contact">Contact Us</button>
          </div>
        </div>

        <div class="image">
          <img src="../img/coffee.jpg" alt="coffee">
        </div>
      </div>
    </div>

</html>
