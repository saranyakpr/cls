<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <section class="container">

        <!-- nav -->
        <nav>
            <div>logo</div>
            <ul>
                <li><a href="#home" class="active">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#service">Service</a></li>
                <li><a href="#team">Team</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>

        <div class="main" id="home">Home</div>
        <div class="main" id="about">About</div>
        <div class="main" id="service">Service</div>
        <div class="main">FAQ</div>
        <div class="main" id="team">Team</div>
        <div class="main" id="contact">Contact</div>

    </section>
    <button id="topBtn"><i class="fa-solid fa-arrow-up"></i></button>

    <script>
        
        const navLinks = document.querySelectorAll('nav ul li a');
        const sections = document.querySelectorAll('.main');
        const topBtn = document.getElementById('topBtn');

        window.addEventListener('scroll', ()=>{
            let current = 'home';
            sections.forEach((section)=>{
                const sectionTop = section.offsetTop - 100;
                const sectionHeight = section.clientHeight;
                if(window.scrollY >= sectionTop && window.scrollY < sectionTop+sectionHeight){
                    current = section.id;
                }
            });

            navLinks.forEach((link)=>{
                link.classList.remove('active');
                if(link.getAttribute('href') === '#'+current){
                    link.classList.add('active');
                }
            });

            if(window.scrollY > 200){
                topBtn.style.display = 'block';
            }
            else{
                topBtn.style.display = 'none';
            }
        })

        topBtn.addEventListener("click", ()=>{
            window.scrollTo({
                top:0,
                behavior:"smooth"
            })
        })
    </script>


</body>
</html>
