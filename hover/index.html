<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        .card{
            width: 30%;
            position: relative;
        }
        .overlay{
            position: absolute;
            inset: 0;
            background-color: rgb(43, 41, 41);
            opacity: 0;
            transition: .5s;
        }
        .card:hover .overlay{
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="../img/coffee.jpg" alt="coffee"/>
        <div class="overlay">
            <h1>hi</h1>
        </div>
    </div>
</body>
</html>
