<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2 id="val">head</h2>
    <button onclick="onclickFun()">click</button>


    <script>
        let val = document.getElementById('val');
        function onclickFun() {
            val.innerHTML = "hello world";
        }
    </script>
</body>
</html>
