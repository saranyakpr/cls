<!DOCTYPE html>
<html lang="en">

    <title>Responsive Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

            <img src="https://picsum.photos/300/200" alt="image">

            <img src="https://picsum.photos/300/201" alt="image">
            <h2>Frontend Developer</h2>

        </div>

        <div class="card">
            <img src="https://picsum.photos/300/202" alt="image">

            <button>Read More</button>

    </div>

</body>
</html>
